# docker-compose.yml — Stack PROD Tournoi TFT EDS + Vitrine EDS
#
# USAGE COMPLET (tournoi + vitrine + Supabase) — depuis le dossier docker/ :
#   docker compose -f docker-compose.yml -f supabase/docker-compose.yml up -d
#
# USAGE TOURNOI SEUL (sans Supabase / vitrine) :
#   docker compose up -d
#
# Secrets compose (Traefik, PG tournoi) : docker/.env (copier docker/.env.example)
# Secrets vitrine : apps/vitrine/.env.prod (copier apps/vitrine/.env.prod.example)
# Secrets Supabase : docker/supabase/.env (copier docker/supabase/.env.example)

services:
  traefik:
    image: traefik:v3
    container_name: tournoi-tft-traefik
    restart: unless-stopped
    command:
      # Providers
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=tournoi-net
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirection globale HTTP -> HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      # Resolver Let's Encrypt (HTTP-01, CA server bascule staging<->prod via env)
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.caServer=${LETSENCRYPT_CA_SERVER}
      # Logs / accesslog minimalistes (pas de dashboard, pas d'API exposee)
      - --log.level=INFO
      - --accesslog=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    networks:
      - tournoi-net

  postgres:
    image: postgres:17-alpine
    container_name: tournoi-tft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tournoi-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tournoi-net

  backend:
    build:
      # Contexte racine du monorepo (le compose vit dans docker/, donc ".." = racine).
      # Permet a pnpm de lire pnpm-lock.yaml + pnpm-workspace.yaml partages.
      context: ..
      dockerfile: apps/tournoi-api/Dockerfile
    container_name: tournoi-tft-backend
    restart: unless-stopped
    env_file:
      - ../apps/tournoi-api/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=tournoi-net"
      - "traefik.http.routers.tournoi-tft-api.rule=Host(`api-tournoi.esportdessacres.fr`)"
      - "traefik.http.routers.tournoi-tft-api.entrypoints=websecure"
      - "traefik.http.routers.tournoi-tft-api.tls=true"
      - "traefik.http.routers.tournoi-tft-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.tournoi-tft-api.loadbalancer.server.port=3001"
    networks:
      - tournoi-net

  frontend:
    build:
      # Contexte racine du monorepo (cf. service backend ci-dessus).
      context: ..
      dockerfile: apps/tournoi-web/Dockerfile
      args:
        # Vite injecte VITE_API_URL au build (pas au runtime). Cette valeur
        # est figee dans le bundle JS produit par "npm run build".
        VITE_API_URL: https://api-tournoi.esportdessacres.fr
    container_name: tournoi-tft-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=tournoi-net"
      - "traefik.http.routers.tournoi-tft-web.rule=Host(`tournoi.esportdessacres.fr`)"
      - "traefik.http.routers.tournoi-tft-web.entrypoints=websecure"
      - "traefik.http.routers.tournoi-tft-web.tls=true"
      - "traefik.http.routers.tournoi-tft-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.tournoi-tft-web.loadbalancer.server.port=80"
    networks:
      - tournoi-net

  # ─────────────────────────────────────────────────
  # Vitrine EDS — Site vitrine Next.js (esportdessacres.fr)
  # NEXT_PUBLIC_SITE_URL fige au build (build-arg, inlineee dans le bundle).
  # DATABASE_URL arrives au runtime via env_file (server-only, jamais dans l'image).
  # La base Postgres est celle de Supabase (supabase-db sur tournoi-net).
  # Demarrer avec la commande multi-fichiers pour inclure Supabase :
  #   docker compose -f docker-compose.yml -f supabase/docker-compose.yml up -d
  # ─────────────────────────────────────────────────
  vitrine:
    build:
      context: ..
      dockerfile: apps/vitrine/Dockerfile
      args:
        # NEXT_PUBLIC_SITE_URL est inlineee dans le bundle Next au build.
        # Ne pas passer DATABASE_URL ici (server-only, contiendrait des identifiants).
        NEXT_PUBLIC_SITE_URL: https://esportdessacres.fr
    container_name: eds-vitrine
    restart: unless-stopped
    env_file:
      # DATABASE_URL et vars runtime de la vitrine (jamais committees, cf. .gitignore).
      - ../apps/vitrine/.env.prod
    # Pas de depends_on sur supabase-db : la connexion Drizzle est paresseuse
    # (premier appel a la DB, pas au demarrage du conteneur). La vitrine demarre
    # meme si Supabase n'est pas encore healthy.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=tournoi-net"
      - "traefik.http.routers.eds-vitrine.rule=Host(`esportdessacres.fr`)"
      - "traefik.http.routers.eds-vitrine.entrypoints=websecure"
      - "traefik.http.routers.eds-vitrine.tls=true"
      - "traefik.http.routers.eds-vitrine.tls.certresolver=letsencrypt"
      - "traefik.http.services.eds-vitrine.loadbalancer.server.port=3000"
    networks:
      - tournoi-net

networks:
  tournoi-net:
    name: tournoi-net
    driver: bridge

volumes:
  tournoi-pg-data:
  traefik-acme:
