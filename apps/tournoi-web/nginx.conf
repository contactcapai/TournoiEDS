# nginx.conf — Sert la SPA Vite/React derriere Traefik (TLS termine en amont).
# Hostname filtre par Traefik (label Host(...)), nginx accepte tout via server_name _.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Traefik logue deja les hits — eviter le doublon.
    access_log off;

    # Compression a la volee. Vite produit deja des assets minifies, mais le HTML statique
    # et les SVG inline gagnent en taille reseau.
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # Assets hashes par Vite (immutables) — cache un an + flag immutable.
    # Si le fichier n'existe pas (mauvais hash demande), 404 strict (pas de fallback HTML
    # pour ne pas servir de l'HTML quand un JS est attendu — eviterait Cache poisoning).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html jamais cache : permet un redeploy instantane sans purge cote navigateur.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Fallback SPA : toutes les routes React Router (/qualifications, /admin, /overlay, ...)
    # doivent renvoyer index.html pour que le routing client-side prenne la main.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
